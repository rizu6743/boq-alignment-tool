<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOQ Alignment & AI Rate Transfer Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        :root {
            --bg: #f6f8fb;
            --card: #fff;
            --ink: #101828;
            --muted: #667085;
            --line: #d0d5dd;
            --head: #f2f4f7;
            --blue: #155eef;
            --green: #079455;
            --red: #d92d20;
            --amber: #dc6803;
            --purple: #6938ef;
            --shadow: 0 16px 40px rgba(1, 18, 40, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--ink);
        }

        .wrap {
            max-width: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .hero {
            background: var(--card);
            border-bottom: 1px solid var(--line);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            z-index: 100;
        }

        .brand {
            display: flex;
            gap: 12px;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--blue);
            color: #fff;
            font-weight: 950;
            display: grid;
            place-items: center;
            font-size: 16px;
        }

        .brand > div:last-child {
            flex: 1;
        }

        .tag {
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .subtag {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        h1 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .content {
            flex: 1;
            display: flex;
            overflow: hidden;
            max-width: 100%;
        }

        .sidebar {
            width: 250px;
            background: var(--card);
            border-right: 1px solid var(--line);
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-section {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
        }

        .sidebar-title {
            background: var(--head);
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 700;
            color: var(--ink);
        }

        .sidebar-content {
            padding: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .sheet-tab {
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 4px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .sheet-tab:hover {
            background: var(--head);
        }

        .sheet-tab.active {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .dual-view {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--line);
            overflow: hidden;
        }

        .excel-view {
            background: var(--card);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .excel-header {
            padding: 12px 16px;
            background: var(--head);
            border-bottom: 1px solid var(--line);
            font-weight: 700;
            font-size: 13px;
            color: var(--ink);
        }

        .excel-table-container {
            flex: 1;
            overflow: auto;
            background: white;
        }

        .excel-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            font-family: 'Courier New', monospace;
        }

        .excel-table th {
            background: #f0f0f0;
            padding: 8px;
            text-align: left;
            font-weight: 700;
            border-bottom: 2px solid var(--line);
            border-right: 1px solid var(--line);
            position: sticky;
            top: 0;
            z-index: 10;
            min-width: 80px;
        }

        .excel-table td {
            padding: 8px;
            border-bottom: 1px solid #f0f0f0;
            border-right: 1px solid #f0f0f0;
            min-width: 80px;
        }

        .excel-table tr:hover {
            background: #f9fafb;
        }

        .excel-table tr.selected {
            background: #dbeafe;
        }

        .row-number {
            background: #f0f0f0;
            color: var(--muted);
            font-weight: 600;
            width: 40px;
            text-align: center;
            min-width: 40px;
        }

        .controls {
            padding: 16px 20px;
            background: var(--card);
            border-top: 1px solid var(--line);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            max-width: 100%;
        }

        label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
        }

        input[type="file"],
        input[type="text"],
        input[type="number"],
        select {
            padding: 8px 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
        }

        input[type="file"]:focus,
        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(21, 94, 239, 0.1);
        }

        button {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            background: var(--blue);
            color: white;
            transition: all 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.secondary {
            background: var(--head);
            color: var(--ink);
            border: 1px solid var(--line);
        }

        button.green {
            background: var(--green);
        }

        .status {
            padding: 8px 12px;
            background: #eff8ff;
            border: 1px solid #b2ddff;
            border-radius: 6px;
            font-size: 12px;
            color: #0055cc;
        }

        .status.good {
            background: #f0fdf4;
            border-color: #86efac;
            color: #166534;
        }

        .status.bad {
            background: #fef2f2;
            border-color: #fecaca;
            color: #991b1b;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 8px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            box-shadow: var(--shadow);
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 700;
            color: var(--ink);
        }

        .form-group input,
        .form-group select {
            width: 100%;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .hidden {
            display: none !important;
        }

        .tooltip {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .control-group {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .control-group > label {
            min-width: 200px;
        }

        @media (max-width: 1024px) {
            .dual-view {
                grid-template-columns: 1fr;
            }

            .sidebar {
                width: 200px;
            }
        }

        .row-selector {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 1px solid var(--line);
            border-radius: 3px;
            cursor: pointer;
            background: white;
            margin-right: 8px;
        }

        .row-selector.selected {
            background: var(--blue);
            border-color: var(--blue);
        }

        .drag-indicator {
            color: var(--green);
            font-weight: 700;
            cursor: grab;
        }

        .drag-indicator:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <!-- Header -->
        <div class="hero">
            <div class="brand">
                <div class="logo">BQ</div>
                <div>
                    <div class="tag">Candy CCS to Client BOQ</div>
                    <h1>BOQ Alignment & Rate Transfer Tool</h1>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="content">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">📋 Client BOQ</div>
                    <div class="sidebar-content" id="clientSheetList"></div>
                </div>
                <div class="sidebar-section">
                    <div class="sidebar-title">📦 CCS BOQ</div>
                    <div class="sidebar-content" id="ccsSheetList"></div>
                </div>
            </div>

            <!-- Dual Excel Views -->
            <div class="main-area">
                <div class="dual-view">
                    <!-- Client BOQ View -->
                    <div class="excel-view">
                        <div class="excel-header">Client BOQ - <span id="clientSheetName">Select Sheet</span></div>
                        <div class="excel-table-container">
                            <table class="excel-table" id="clientExcelTable">
                                <thead id="clientTableHead"></thead>
                                <tbody id="clientTableBody"></tbody>
                            </table>
                        </div>
                    </div>

                    <!-- CCS BOQ View -->
                    <div class="excel-view">
                        <div class="excel-header">CCS BOQ - <span id="ccsSheetName">Select Sheet</span></div>
                        <div class="excel-table-container">
                            <table class="excel-table" id="ccsExcelTable">
                                <thead id="ccsTableHead"></thead>
                                <tbody id="ccsTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Bottom Controls -->
                <div class="controls">
                    <label>
                        📥 Upload Client BOQ
                        <input type="file" id="clientFile" accept=".xlsx,.xlsm,.xls">
                    </label>
                    <label>
                        📥 Upload CCS BOQ
                        <input type="file" id="ccsFile" accept=".xlsx,.xlsm,.xls">
                    </label>
                    <button id="loadFilesBtn">Load Files</button>
                    <div id="statusMsg" class="status hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Column Mapping Modal -->
    <div class="modal" id="mappingModal">
        <div class="modal-box">
            <div class="modal-title">Map Columns</div>
            <div class="modal-form">
                <div class="form-group">
                    <label>Description Column</label>
                    <select id="mapDesc"></select>
                </div>
                <div class="form-group">
                    <label>Quantity Column</label>
                    <select id="mapQty"></select>
                </div>
                <div class="form-group">
                    <label>Unit Column</label>
                    <select id="mapUnit"></select>
                </div>
                <div class="form-group">
                    <label>Rate Column</label>
                    <select id="mapRate"></select>
                </div>
                <div class="form-group">
                    <label>Amount Column</label>
                    <select id="mapAmount"></select>
                </div>
                <div class="modal-buttons">
                    <button id="confirmMappingBtn">Confirm Mapping</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global State
        const S = {
            clientWb: null,
            ccsWb: null,
            clientSheetIdx: 0,
            ccsSheetIdx: 0,
            columnMapping: {}
        };

        const E = {};
        const elementIds = [
            'clientFile', 'ccsFile', 'loadFilesBtn', 'statusMsg',
            'clientSheetList', 'ccsSheetList', 'clientSheetName', 'ccsSheetName',
            'clientExcelTable', 'ccsExcelTable', 'clientTableHead', 'ccsTableHead',
            'clientTableBody', 'ccsTableBody',
            'mappingModal', 'mapDesc', 'mapQty', 'mapUnit', 'mapRate', 'mapAmount', 'confirmMappingBtn'
        ];

        elementIds.forEach(id => { E[id] = document.getElementById(id); });

        // Utility Functions
        function text(cell) {
            const v = cell?.value;
            if (v == null) return '';
            if (typeof v === 'object' && v.richText) return v.richText.map(rt => rt.text).join('');
            return String(v);
        }

        function norm(v) { return String(v ?? '').replace(/\s+/g, ' ').trim().toLowerCase(); }
        function clean(v) { return norm(v).replace(/[^a-z0-9 ]/g, '').trim(); }

        async function loadWb(file) {
            const wb = new ExcelJS.Workbook();
            await wb.xlsx.load(await file.arrayBuffer());
            return wb;
        }

        function detectHeader(ws) {
            let best = 1, score = -1;
            for (let r = 1; r <= Math.min(ws.rowCount, 50); r++) {
                let s = 0, non = 0;
                ws.getRow(r).eachCell({ includeEmpty: false }, cell => {
                    const c = clean(text(cell));
                    if (c) { non++; if (c.length > 2 && c.length < 30) s++; }
                });
                if (non > 3 && s > score) { score = s; best = r; }
            }
            return best;
        }

        function getHeaders(ws) {
            const hr = detectHeader(ws);
            const headers = [];
            ws.getRow(hr).eachCell({ includeEmpty: false }, (cell) => {
                headers.push(text(cell).trim());
            });
            return headers;
        }

        function getRowData(ws, colCount) {
            const hr = detectHeader(ws);
            const rows = [];
            for (let r = hr + 1; r <= ws.rowCount; r++) {
                const row = ws.getRow(r);
                const cells = [];
                for (let c = 1; c <= colCount; c++) {
                    cells.push(text(row.getCell(c)));
                }
                if (cells.some(cell => cell.trim())) {
                    rows.push(cells);
                }
            }
            return { headerRow: hr, rows: rows };
        }

        function renderSheetList(wb, containerId, selectCallback) {
            const container = E[containerId];
            container.innerHTML = '';
            wb.worksheets.forEach((ws, idx) => {
                const tab = document.createElement('div');
                tab.className = 'sheet-tab';
                tab.textContent = ws.name;
                tab.onclick = () => selectCallback(idx);
                container.appendChild(tab);
            });
        }

        function renderExcelView(ws, containerId, headerId, bodyId, tableId) {
            const headers = getHeaders(ws);
            const data = getRowData(ws, headers.length);

            // Render headers
            let headerHtml = '<tr><th class="row-number">#</th>';
            headers.forEach((h, idx) => {
                headerHtml += `<th>${h || `Col${idx + 1}`}</th>`;
            });
            headerHtml += '</tr>';
            E[headerId].innerHTML = headerHtml;

            // Render body rows
            let bodyHtml = '';
            data.rows.slice(0, 100).forEach((row, idx) => {
                bodyHtml += `<tr><td class="row-number">${data.headerRow + idx + 1}</td>`;
                row.forEach(cell => {
                    bodyHtml += `<td>${cell}</td>`;
                });
                bodyHtml += '</tr>';
            });
            E[bodyId].innerHTML = bodyHtml;

            E[tableId].style.display = 'table';
            
            if (data.rows.length > 100) {
                const note = document.createElement('div');
                note.style.padding = '12px';
                note.style.fontSize = '11px';
                note.style.color = 'var(--muted)';
                note.textContent = `Showing 100 of ${data.rows.length} rows`;
                E[tableId].parentElement.appendChild(note);
            }
        }

        function populateColumnDropdowns(headers) {
            const dropdowns = [E.mapDesc, E.mapQty, E.mapUnit, E.mapRate, E.mapAmount];
            dropdowns.forEach(dd => {
                dd.innerHTML = '<option value="">-- Select --</option>' +
                    headers.map((h, idx) => `<option value="${idx}">${h || `Col${idx + 1}`}</option>`).join('');
            });
        }

        // Load Files
        E.loadFilesBtn.onclick = async () => {
            if (!E.clientFile.files[0] || !E.ccsFile.files[0]) {
                E.statusMsg.textContent = '❌ Please select both files';
                E.statusMsg.className = 'status bad';
                E.statusMsg.classList.remove('hidden');
                return;
            }

            E.statusMsg.textContent = '⏳ Loading files...';
            E.statusMsg.className = 'status';
            E.statusMsg.classList.remove('hidden');

            try {
                S.clientWb = await loadWb(E.clientFile.files[0]);
                S.ccsWb = await loadWb(E.ccsFile.files[0]);

                // Render sheet lists
                renderSheetList(S.clientWb, 'clientSheetList', (idx) => {
                    S.clientSheetIdx = idx;
                    const ws = S.clientWb.worksheets[idx];
                    E.clientSheetName.textContent = ws.name;
                    renderExcelView(ws, 'clientSheetName', 'clientTableHead', 'clientTableBody', 'clientExcelTable');
                });

                renderSheetList(S.ccsWb, 'ccsSheetList', (idx) => {
                    S.ccsSheetIdx = idx;
                    const ws = S.ccsWb.worksheets[idx];
                    E.ccsSheetName.textContent = ws.name;
                    renderExcelView(ws, 'ccsSheetName', 'ccsTableHead', 'ccsTableBody', 'ccsExcelTable');
                });

                // Load initial sheets
                const clientWs = S.clientWb.worksheets[0];
                const ccsWs = S.ccsWb.worksheets[0];

                E.clientSheetName.textContent = clientWs.name;
                E.ccsSheetName.textContent = ccsWs.name;

                renderExcelView(clientWs, 'clientSheetName', 'clientTableHead', 'clientTableBody', 'clientExcelTable');
                renderExcelView(ccsWs, 'ccsSheetName', 'ccsTableHead', 'ccsTableBody', 'ccsExcelTable');

                // Show mapping modal
                const headers = getHeaders(clientWs);
                populateColumnDropdowns(headers);
                E.mappingModal.classList.add('show');

                E.statusMsg.textContent = '✅ Files loaded successfully!';
                E.statusMsg.className = 'status good';
            } catch (err) {
                E.statusMsg.textContent = '❌ Error: ' + err.message;
                E.statusMsg.className = 'status bad';
            }
        };

        // Confirm Mapping
        E.confirmMappingBtn.onclick = () => {
            S.columnMapping = {
                desc: parseInt(E.mapDesc.value),
                qty: parseInt(E.mapQty.value),
                unit: parseInt(E.mapUnit.value),
                rate: parseInt(E.mapRate.value),
                amount: parseInt(E.mapAmount.value)
            };

            E.mappingModal.classList.remove('show');
            E.statusMsg.textContent = '✅ Column mapping confirmed. You can now drag rows and select additional items.';
            E.statusMsg.className = 'status good';
            E.statusMsg.classList.remove('hidden');
        };

        // Initialize
        E.clientSheetName.textContent = 'No file loaded';
        E.ccsSheetName.textContent = 'No file loaded';
    </script>
</body>
</html>
